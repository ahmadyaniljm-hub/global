<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>Data Keuangan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#f1f5f9;
    padding:12px;
    padding-bottom:120px; /* tambahkan ini */
    color:#111827;
}

/* =========================
   HEADER
========================= */

.header{
    margin-bottom:16px;
}

.header h1{
    font-size:18px;
    font-weight:700;
    margin-bottom:10px;
    color:#111827;
    line-height:1.3;
}

/* =========================
   SEARCH BOX
========================= */

.search-box{
    width:100%;
    position:relative;
}

.search-box input{
    width:100%;
    padding:15px 18px;
    border:none;
    border-radius:18px;
    font-size:10px;
    outline:none;
    background:#ffffff;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    transition:0.3s;
}

.search-box input:focus{
    box-shadow:0 5px 25px rgba(59,130,246,0.25);
}

/* =========================
   TABLE
========================= */

.table-container{
    width:100%;
    overflow-x:auto;
    overflow-y:auto;
    background:#ffffff;
    border-radius:22px;
    box-shadow:0 8px 30px rgba(0,0,0,0.08);
    -webkit-overflow-scrolling:touch;
    padding-bottom:120px; /* tambahkan ini */
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:850px;
    margin-bottom:110px; /* tambahkan ini */
}

thead{
    background:#111827;
    color:#ffffff;
    position:sticky;
    top:0;
    z-index:10;
}

th{
    padding:16px 14px;
    text-align:left;
    font-size:10px;
    font-weight:600;
    white-space:nowrap;
}

td{
    padding:15px 14px;
    border-bottom:1px solid #e5e7eb;
    font-size:10px;
    vertical-align:middle;
}

tbody tr{
    transition:0.2s;
}

tbody tr:hover{
    background:#f8fafc;
}

/* =========================
   BADGE
========================= */

.badge{
    padding:7px 12px;
    border-radius:999px;
    font-size:9px;
    font-weight:600;
    display:inline-block;
    color:#ffffff;
    white-space:nowrap;
}

/* PY = GOLD */

.pembayaran{
    background:#facc15;
    color:#111827;
}

/* TK = MERAH */

.pengambilan{
    background:#ef4444;
    color:#ffffff;
}

/* TF / CS = HIJAU */

.masuk{
    background:#22c55e;
    color:#ffffff;
}

/* DEFAULT */

.default{
    background:#6b7280;
    color:#ffffff;
}

/* =========================
   NOMINAL
========================= */

.nominal{
    font-weight:700;
    color:#111827;
    white-space:nowrap;
}

/* =========================
   FLOATING CARD
========================= */

.floating-card{
    position:fixed;
    left:12px;
    right:12px;
    bottom:12px;
    background:#111827;
    color:#ffffff;
    padding:14px 18px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    z-index:999;
    animation:fadeIn 0.5s ease;
    backdrop-filter:blur(8px);
    width:auto;
    min-width:170px;
    max-width:220px;
}

.floating-card h3{
    font-size:10px;
    font-weight:500;
    margin-bottom:4px;
    opacity:0.9;
}

.floating-card h2{
    font-size:18px;
    font-weight:700;
    line-height:1.2;
    word-break:break-word;
}

/* =========================
   LOADING
========================= */

.loading{
    padding:35px;
    text-align:center;
    font-size:10px;
}

/* =========================
   SCROLLBAR
========================= */

.table-container::-webkit-scrollbar{
    height:6px;
}

.table-container::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:20px;
}

/* =========================
   ANIMATION
========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* =========================
   RESPONSIVE TABLET
========================= */

@media(min-width:769px){

    body{
        padding:20px;
    }

    .header h1{
        font-size:20px;
    }

    .search-box input{
        font-size:10px;
        padding:16px 20px;
    }

    th{
        font-size:10px;
        padding:18px 16px;
    }

    td{
        font-size:10px;
        padding:16px;
    }

    .badge{
        font-size:10px;
        padding:8px 14px;
    }

    .floating-card{
        left:auto;
        right:20px;
        bottom:20px;
        min-width:240px;
        border-radius:24px;
        padding:20px 24px;
    }

    .floating-card h2{
        font-size:20px;
    }

}

/* =========================
   MOBILE EXTRA
========================= */

@media(max-width:480px){

    body{
        padding:10px;
    }

    .header h1{
        font-size:18px;
    }

    .search-box input{
        padding:14px 15px;
        font-size:10px;
        border-radius:16px;
    }

    th{
        font-size:10px;
        padding:13px;
    }

    td{
        font-size:10px;
        padding:13px;
    }

    .badge{
        font-size:10px;
        padding:6px 10px;
    }

    .floating-card{
        right:10px;
        bottom:10px;
        padding:12px 14px;
        min-width:150px;
        max-width:180px;
        border-radius:16px;
    }

    .floating-card h2{
        font-size:17px;
    }

}

</style>
</head>

<body>

<!-- =========================
     HEADER
========================= -->

<div class="header">

    <h1>Data Keuangan</h1>

    <div class="search-box">

        <input 
            type="text" 
            id="searchInput"
            placeholder="Cari tanggal, kode, nominal, user ID..."
        >

    </div>

</div>

<!-- =========================
     TABLE
========================= -->

<div class="table-container">

    <table>

        <thead>

            <tr>
                <th>Tanggal</th>
                <th>Kode</th>
                <th>Keterangan</th>
                <th>Posisi</th>
                <th>Nominal</th>
                <th>User ID</th>
            </tr>

        </thead>

        <tbody id="tableBody">

            <tr>
                <td colspan="6" class="loading">
                    Memuat data...
                </td>
            </tr>

        </tbody>

    </table>

</div>

<!-- =========================
     FLOATING TOTAL
========================= -->

<div class="floating-card">

    <h3>Jumlah Uang</h3>

    <h2 id="totalUang">
        Rp. 0
    </h2>

</div>

<script>

/* =========================================
   GOOGLE SHEET URL
========================================= */

const sheetURL =
'https://docs.google.com/spreadsheets/d/1hAhqTkCE0iZ68saOfaXJQ02--HwWq6tM6eAYqDjz0Qg/gviz/tq?tqx=out:json&gid=1419195723';

let allData = [];

/* =========================================
   FORMAT RUPIAH
========================================= */

function formatRupiah(angka){

    angka = Number(angka) || 0;

    return angka.toLocaleString('id-ID');

}

/* =========================================
   FORMAT TANGGAL
========================================= */

function formatTanggal(value){

    if(!value) return '';

    const match = value.match(/Date\((\d+),(\d+),(\d+)\)/);

    if(match){

        const year  = parseInt(match[1]);
        const month = parseInt(match[2]) + 1;
        const day   = parseInt(match[3]);

        const dd = String(day).padStart(2,'0');
        const mm = String(month).padStart(2,'0');

        return `${dd}/${mm}/${year}`;

    }

    return value;

}

/* =========================================
   LOAD DATA
========================================= */

async function loadData(){

    try{

        const response = await fetch(sheetURL);

        const text = await response.text();

        const json = JSON.parse(
            text.substring(47).slice(0,-2)
        );

        const rows = json.table.rows;

        allData = rows.map(row => {

            const c = row.c;

            return {

                tanggal   : formatTanggal(c[0]?.f || c[0]?.v || ''),
                kode      : c[1]?.v || '',
                keterangan: c[2]?.v || '',
                posisi    : c[3]?.v || '',
                nominal   : Number(c[4]?.v || 0),
                userId    : c[5]?.v || ''

            };

        });

        renderTable(allData);

    }catch(error){

        document.getElementById('tableBody').innerHTML = `
            <tr>
                <td colspan="6" class="loading">
                    Gagal mengambil data
                </td>
            </tr>
        `;

        console.log(error);

    }

}

/* =========================================
   RENDER TABLE
========================================= */

function renderTable(data){

    const tableBody =
        document.getElementById('tableBody');

    if(data.length === 0){

        tableBody.innerHTML = `
            <tr>
                <td colspan="6" class="loading">
                    Data tidak ditemukan
                </td>
            </tr>
        `;

        updateTotal(0);

        return;

    }

    let html = '';

    let total = 0;

    data.forEach(item => {

        total += item.nominal;

        let posisiClass = 'default';

        const kode =
            item.kode.toString().toUpperCase();

        if(kode.includes('PY')){

            posisiClass = 'pembayaran';

        }else if(kode.includes('TK')){

            posisiClass = 'pengambilan';

        }else if(
            kode.includes('TF') ||
            kode.includes('CS')
        ){

            posisiClass = 'masuk';

        }

        html += `

            <tr>

                <td>${item.tanggal}</td>

                <td>
                    <span class="badge ${posisiClass}">
                        ${item.kode}
                    </span>
                </td>

                <td>${item.keterangan}</td>

                <td>${item.posisi}</td>

                <td class="nominal">
                    Rp. ${formatRupiah(item.nominal)}
                </td>

                <td>${item.userId}</td>

            </tr>

        `;

    });

    tableBody.innerHTML = html;

    updateTotal(total);

}

/* =========================================
   UPDATE TOTAL
========================================= */

function updateTotal(total){

    document.getElementById('totalUang').innerHTML =
        'Rp. ' + formatRupiah(total);

}

/* =========================================
   SEARCH FILTER
========================================= */

document
.getElementById('searchInput')
.addEventListener('keyup', function(){

    const keyword =
        this.value.toLowerCase();

    const filtered = allData.filter(item => {

        return (

            item.tanggal.toString().toLowerCase().includes(keyword) ||
            item.kode.toString().toLowerCase().includes(keyword) ||
            item.keterangan.toString().toLowerCase().includes(keyword) ||
            item.posisi.toString().toLowerCase().includes(keyword) ||
            item.nominal.toString().toLowerCase().includes(keyword) ||
            item.userId.toString().toLowerCase().includes(keyword)

        );

    });

    renderTable(filtered);

});

/* =========================================
   LOAD AWAL
========================================= */

loadData();

</script>

</body>
</html>
